<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Defines the character encoding used for the webpage -->
    <meta charset="UTF-8">

    <!-- Title displayed in the browser tab -->
    <title>AlUla 360 - Tour Schedule</title>

    <!-- Link to the main stylesheet used for screen display -->
    <link rel="stylesheet" href="../global/main.css">

    <!-- Link to a special stylesheet used when the page is printed -->
    <link rel="stylesheet" href="../global/print.css" media="print">

</head>

<body>

    <!-- Header section containing the website logo, title, and navigation menu -->
    <header>

<!-- Website logo -->
<img src="../images/logo.png" alt="AlUla Logo" id="site-logo">

<!-- Main website title -->
<h1>AlUla 360</h1>

<!-- Navigation menu allowing users to move between the pages -->
<nav>

<!-- Link to the Home page -->
<a href="../index.html">Home</a>

<!-- Link to the History page -->
<a href="about.html">History</a>

<!-- Link to the Services page -->
<a href="services.html">Services</a>

<!-- Link to the Video page -->
<a href="video.html">Video</a>

<!-- Link to the Schedule page -->
<a href="schedule.html">Schedule</a>

<!-- Link to the Feedback page -->
<a href="feedback.html">Feedback</a>

</nav>

</header>


    <!-- Main content area where the tour schedule is displayed -->
    <div id="main-content">

        <!-- Page title -->
        <h2>Weekly Tour Itinerary</h2>

        <!-- Table showing the weekly schedule for AlUla tours -->
        <table border="1" width="100%">

            <!-- Caption describing the table -->
            <caption>AlUla Weekly Tour Schedule</caption>

            <!-- Table header section -->
            <thead>

                <!-- Row containing column titles -->
                <tr>

                    <!-- Column for time -->
                    <th>Time</th>

                    <!-- Columns for days of the week -->
                    <th>Sunday</th>
                    <th>Monday</th>
                    <th>Tuesday</th>

                </tr>

            </thead>

            <!-- Table body containing the schedule details -->
            <tbody>

                <!-- First schedule row -->
                <tr>

                    <!-- Time column -->
                    <th>09:00 AM</th>

                    <!-- Activity spanning two rows -->
                    <td rowspan="2">Old Town Walking Tour</td>

                    <!-- Activity for Monday -->
                    <td>Elephant Rock Visit</td>

                    <!-- Activity for Tuesday -->
                    <td>Dadan Museum</td>

                </tr>

                <!-- Second schedule row -->
                <tr>

                    <!-- Time column -->
                    <th>10:00 AM</th>

                    <!-- Monday activity -->
                    <td>Coffee Break</td>

                    <!-- Tuesday activity -->
                    <td>Art Workshop</td>

                </tr>

                <!-- Third schedule row -->
                <tr>

                    <!-- Time column -->
                    <th>11:00 AM</th>

                    <!-- Activity spanning all three days -->
                    <td colspan="3">Lunch Break &amp; Mid-day Prayer</td>

                </tr>

            </tbody>

        </table>

    </div>


    <!-- Footer section displayed at the bottom of the page -->
    <footer>

        <!-- Copyright notice -->
        <p>&copy; 2026 AlUla 360 Project</p>

    </footer>

</body>
</html>
